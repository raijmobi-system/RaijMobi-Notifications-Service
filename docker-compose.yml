services:
  notification-service:
    build: .
    container_name: notification-service
    ports:
      - "8005:8000"
    environment:
      - SECRET_KEY=uma-chave-secreta-compartilhada
      - KAFKA_BOOTSTRAP_SERVERS_RIDE=kafka-ride:9092
      - KAFKA_BOOTSTRAP_SERVERS_USER=kafka-user:9092
      - KAFKA_TOPICS_RIDE=ride_notifications
      - KAFKA_TOPICS_USER=user_notifications
      - SERVICE_ORIGIN=notification-service
      - ALLOWED_HOSTS=*
    volumes:
      - media_volume:/app/media   # apenas mídia, se necessário
    networks:
      - raijmobi-network

volumes:
  media_volume:

networks:
  raijmobi-network:
    external: true
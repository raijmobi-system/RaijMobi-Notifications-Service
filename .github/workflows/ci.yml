name: CI - Build and Smoke Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create external network
        run: docker network create raijmobi-network || true

      - name: Build essential services (excluding backup)
        run: |
          docker compose build \
            notification-service \
            notification-consumer-ride \
            notification-consumer-user \
            notification-consumer-chat \
            notification-consumer-user-events \
            postgres-notifications

      - name: Start essential services (excluding backup)
        run: |
          docker compose up -d \
            notification-service \
            notification-consumer-ride \
            notification-consumer-user \
            notification-consumer-chat \
            notification-consumer-user-events \
            postgres-notifications

      - name: Wait for PostgreSQL to be healthy
        run: |
          echo "Waiting for PostgreSQL..."
          timeout=60
          while ! docker exec postgres-notifications pg_isready -U raijmobi_notifications -d raijmobi_notifications_db; do
            sleep 2
            timeout=$((timeout - 2))
            if [ $timeout -le 0 ]; then
              echo "PostgreSQL not ready after 60s"
              exit 1
            fi
          done

      - name: Wait for API service to respond
        run: |
          echo "Waiting for notification-service on port 8005..."
          timeout=30
          while ! curl -s -f http://localhost:8005/metrics > /dev/null; do
            sleep 2
            timeout=$((timeout - 2))
            if [ $timeout -le 0 ]; then
              echo "Service did not respond"
              exit 1
            fi
          done

      - name: Check running containers
        run: docker ps --filter "status=running" --format "table {{.Names}}\t{{.Status}}"

      - name: Collect logs (if failure)
        if: always()
        run: docker compose logs --tail=50

      - name: Stop containers
        if: always()
        run: docker compose down -v